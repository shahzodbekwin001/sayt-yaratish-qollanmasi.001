<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayt Yaratish Qo'llanmasi</title>
    <style>
        <meta name="description" content="Sayt yaratish bo'yicha 30 ta muhim qadamdan iborat interaktiv qo'llanma.">
    <meta name="keywords" content="sayt yaratish, html, css, o'rganish, shahzodbek">
    <meta name="author" content="Shahzodbek">
        /* --- UMUMIY STYLLAR --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 5px; }

        /* --- 1. ASOSIY EKRAN --- */
        #startScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            flex-direction: column;
            position: relative;
        }

        /* --- BURCHAKDAGI RASMLAR --- */
        .corner-img {
            position: absolute;
            top: 30px;
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 10px #00ff00) brightness(1.2);
            transition: transform 0.3s ease;
        }
        .corner-img:hover { transform: scale(1.1); }
        .img-left { left: 30px; }
        .img-right { right: 30px; }

        /* --- SARLAVHA --- */
        .main-title {
            color: white;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 36px;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
        }

        /* TUGMALAR */
        .btn-container { display: flex; gap: 30px; }

        .main-btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .main-btn:hover {
            background-color: #00ff00;
            color: black;
            border-color: #00ff00;
            box-shadow: 0 0 25px #00ff00;
            transform: translateY(-5px);
        }

        /* --- 2. QO'LLANMA EKRANI --- */
        #guideScreen {
            display: none;
            height: 100%;
            width: 100%;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
            background-color: #050505;
        }

        .guide-header { text-align: center; margin-bottom: 40px; }
        .guide-header h1 { color: #00ff00; text-transform: uppercase; font-size: 36px; text-shadow: 0 0 15px rgba(0,255,0,0.5); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        .card {
            background-color: #111;
            border: 1px solid #333;
            border-top: 3px solid #00ff00;
            padding: 20px;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0, 255, 0, 0.2); border-color: #00ff00; }
        .card h3 { color: #00ff00; margin-top: 0; }
        .card p { color: #ccc; font-size: 14px; line-height: 1.5; }

        /* --- MODAL OYNALAR --- */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px); justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: #111; border: 2px solid #00ff00; color: white;
            padding: 30px; border-radius: 15px; width: 350px; max-height: 90vh;
            overflow-y: auto; box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); position: relative;
        }

        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 24px; cursor: pointer; z-index: 10; }
        .close-btn:hover { color: #00ff00; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #00ff00; font-size: 14px; }
        
        .input-group input, .input-group select { 
            width: 100%; padding: 10px; background-color: #222; border: 1px solid #555; 
            color: white; border-radius: 5px; outline: none; box-sizing: border-box; 
            transition: 0.3s;
        }
        .input-group input:focus { border-color: #00ff00; }

        /* XATO (ERROR) STYLLARI */
        .error-input { border-color: #ff0000 !important; box-shadow: 0 0 10px #ff0000 !important; animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

        .submit-btn { width: 100%; padding: 12px; background-color: #00ff00; border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background-color: white; box-shadow: 0 0 15px #00ff00; }

        /* --- LOGIN OYNASI ICHIDAGI LINKLAR --- */
        .bottom-links {
            display: flex;
            justify-content: space-between; /* Ikki chetga surish */
            margin-top: 15px;
            font-size: 13px;
        }

        .action-link {
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-link:hover {
            color: #00ff00;
            text-decoration: underline;
        }

        /* Sahifalarni yashirish/ko'rsatish uchun */
        .view-section {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <!-- 1. ASOSIY EKRAN -->
    <div id="startScreen">
        <img src="https://cdn-icons-png.flaticon.com/512/2933/2933245.png" alt="PC" class="corner-img img-left">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Microsoft_logo.svg/2048px-Microsoft_logo.svg.png" alt="Win" class="corner-img img-right">
        
        <h1 class="main-title">Sayt Yaratish Qo'llanmasi</h1>

        <div class="btn-container">
            <button class="main-btn" id="loginBtn">Login</button>
            <button class="main-btn" id="infoBtn">Malumot</button>
        </div>
    </div>

    <!-- 2. QO'LLANMA EKRANI -->
    <div id="guideScreen">
        <div class="guide-header">
            <h1>Xush Kelibsiz!</h1>
            <p style="color: #888;">Sayt yaratish bo'yicha 30 ta muhim qadam:</p>
        </div>
        <div class="cards-grid" id="cardsContainer"></div>
        <div style="text-align: center; margin-top: 30px; margin-bottom: 50px;">
            <button class="main-btn" onclick="location.reload()">Chiqish</button>
        </div>
    </div>

    <!-- LOGIN OYNASI (ICHIDA 3 TA QISM BOR) -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn login-close">&times;</span>
            
            <!-- 1. LOGIN (KIRISH) QISMI -->
            <div id="viewLogin" class="view-section">
                <h2 style="text-align: center; color: white;">Kirish</h2>
                <div class="input-group"><label>Login:</label><input type="text" id="inpLogin"></div>
                <div class="input-group"><label>Parol:</label><input type="password" id="inpPass"></div>
                <button class="submit-btn" id="submitLoginBtn">Kirish</button>
                
                <!-- YANGI QO'SHILGAN TUGMALAR -->
                <div class="bottom-links">
                    <span class="action-link" onclick="showRegister()">Ro'yxatdan o'tish</span>
                    <span class="action-link" onclick="showForgot()">Parolni unutdingizmi?</span>
                </div>
            </div>

            <!-- 2. RO'YXATDAN O'TISH QISMI -->
            <div id="viewRegister" class="view-section" style="display: none;">
                <h2 style="text-align: center; color: white;">Ro'yxatdan o'tish</h2>
                <div class="input-group"><label>Yangi Login:</label><input type="text" id="regLogin"></div>
                <div class="input-group"><label>Yangi Parol:</label><input type="password" id="regPass"></div>
                <button class="submit-btn" id="submitRegisterBtn">Saqlash</button>
                
                <div style="text-align: center; margin-top: 15px;">
                    <span class="action-link" onclick="showLoginView()">Kirishga qaytish</span>
                </div>
            </div>

            <!-- 3. PAROLNI TIKLASH QISMI -->
            <div id="viewForgot" class="view-section" style="display: none;">
                <h2 style="text-align: center; color: white;">Parolni Tiklash</h2>
                <p style="font-size: 13px; color: #ccc; text-align: center;">Loginingizni kiriting, biz sizga yangi parol beramiz.</p>
                <div class="input-group"><label>Login:</label><input type="text" id="forgotLogin"></div>
                <button class="submit-btn" id="submitForgotBtn">Tiklash</button>
                
                <div style="text-align: center; margin-top: 15px;">
                    <span class="action-link" onclick="showLoginView()">Kirishga qaytish</span>
                </div>
            </div>

        </div>
    </div>

    <!-- TO'LIQ ANKETA OYNASI -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn info-close">&times;</span>
            <h2 style="text-align: center; color: white;">To'liq Anketa</h2>
            <div class="input-group"><label>Ism:</label><input type="text" id="inpName"></div>
            <div class="input-group"><label>Familiya:</label><input type="text" id="inpSurname"></div>
            <div class="input-group"><label>Tug'ilgan sana:</label><input type="date" id="inpDate"></div>
            <button class="submit-btn" id="submitInfoBtn">Saqlash</button>
        </div>
    </div>

    <script>
        // --- 30 TA KARTA ---
        const steps = [
            { title: "Internet va Web", desc: "Domen, Hosting va Serverlar." },
            { title: "Kod Muharriri", desc: "VS Code o'rnatish." },
            { title: "HTML Asoslari", desc: "Teglar, atributlar va tuzilma." },
            { title: "CSS Asoslari", desc: "Ranglar, o'lchamlar va shriftlar." },
            { title: "CSS Layout", desc: "Flexbox va Grid tizimi." },
            { title: "Responsive Design", desc: "Mobil qurilmalarga moslash." },
            { title: "JavaScript", desc: "Dasturlash asoslari." },
            { title: "DOM", desc: "HTML bilan ishlash." },
            { title: "Git & GitHub", desc: "Versiya nazorati." },
            { title: "React.js", desc: "Frontend Framework." },
            { title: "Backend", desc: "Node.js va Express." },
            { title: "Deploy", desc: "Saytni internetga yuklash." }
        ];

        // Kartalarni sun'iy ravishda 30 taga yetkazish
        const container = document.getElementById("cardsContainer");
        for(let i=0; i<30; i++) {
            let step = steps[i % steps.length];
            let card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<h3>${i+1}. ${step.title}</h3><p>${step.desc}</p>`;
            container.appendChild(card);
        }

        // --- LOGIN VIEW BOSHQARUVI (YANGI QISM) ---
        const viewLogin = document.getElementById("viewLogin");
        const viewRegister = document.getElementById("viewRegister");
        const viewForgot = document.getElementById("viewForgot");

        // Ro'yxatdan o'tishni ochish
        function showRegister() {
            viewLogin.style.display = "none";
            viewRegister.style.display = "block";
            viewForgot.style.display = "none";
        }

        // Parolni unutdingizmini ochish
        function showForgot() {
            viewLogin.style.display = "none";
            viewRegister.style.display = "none";
            viewForgot.style.display = "block";
        }

        // Ortga (Kirishga) qaytish
        function showLoginView() {
            viewLogin.style.display = "block";
            viewRegister.style.display = "none";
            viewForgot.style.display = "none";
        }

        // --- VALIDATSIYA VA TUGMALAR ---
        function showError(input) {
            input.classList.add("error-input");
            input.addEventListener("input", function() { input.classList.remove("error-input"); }, { once: true });
        }

        // 1. KIRISH TUGMASI
        document.getElementById("submitLoginBtn").onclick = function() {
            let l = document.getElementById("inpLogin");
            let p = document.getElementById("inpPass");
            if(l.value.trim() === "") return showError(l);
            if(p.value.trim() === "") return showError(p);
            openGuide();
        };

        // 2. RO'YXATDAN O'TISH TUGMASI
        document.getElementById("submitRegisterBtn").onclick = function() {
            let l = document.getElementById("regLogin");
            let p = document.getElementById("regPass");
            if(l.value.trim() === "") return showError(l);
            if(p.value.trim() === "") return showError(p);
            
            alert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Endi kirishingiz mumkin.");
            showLoginView(); // Kirish oynasiga qaytish
        };

        // 3. PAROL TIKLASH TUGMASI
        document.getElementById("submitForgotBtn").onclick = function() {
            let l = document.getElementById("forgotLogin");
            if(l.value.trim() === "") return showError(l);

            // Simulyatsiya: Tizim yangi parol beradi
            let newPass = Math.floor(Math.random() * 90000) + 10000; // 5 xonali son
            alert(`Sizning vaqtinchalik parolingiz: ${newPass}\nEslab qoling!`);
            showLoginView();
        };

        // --- ASOSIY EKRAN BOSHQARUVI ---
        const startScreen = document.getElementById("startScreen");
        const guideScreen = document.getElementById("guideScreen");
        const loginModal = document.getElementById("loginModal");
        const infoModal = document.getElementById("infoModal");

        document.getElementById("loginBtn").onclick = () => {
            showLoginView(); // Har doim asosiy kirishdan boshlash
            loginModal.style.display = "flex";
        };
        document.getElementById("infoBtn").onclick = () => infoModal.style.display = "flex";
        document.getElementsByClassName("login-close")[0].onclick = () => loginModal.style.display = "none";
        document.getElementsByClassName("info-close")[0].onclick = () => infoModal.style.display = "none";

        window.onclick = (e) => {
            if (e.target == loginModal) loginModal.style.display = "none";
            if (e.target == infoModal) infoModal.style.display = "none";
        }

        function openGuide() {
            loginModal.style.display = "none";
            infoModal.style.display = "none";
            startScreen.style.display = "none";
            guideScreen.style.display = "block";
        }
        
        // Anketa tekshiruvi (qisqartirilgan)
        document.getElementById("submitInfoBtn").onclick = function() {
            if(document.getElementById("inpName").value === "") return showError(document.getElementById("inpName"));
            openGuide();
        }

    </script>
</body>
</html>
